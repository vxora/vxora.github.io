<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="4; url=https://vexora.pythonanywhere.com">
<title>Vexora</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --void: #04010f;
  --gold: #c9922a;
  --gold2: #f0c060;
  --gold3: #ffe8a0;
  --dim: #7a5a9a;
  --text: #e8d8ff;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Crimson Pro', serif;
  background: var(--void);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}

#cosmos {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.nebula {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 80% 60% at 15% 20%, rgba(60,5,130,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 85% 80%, rgba(40,0,100,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(20,0,60,0.4) 0%, transparent 70%);
}

.content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 28px;
  animation: fadeIn 1.2s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.sigil {
  width: 80px;
  height: 80px;
  margin-bottom: 32px;
  position: relative;
}

.sigil svg {
  width: 100%;
  height: 100%;
  animation: sigilspin 20s linear infinite;
  filter: drop-shadow(0 0 18px rgba(201,146,42,0.6));
}

@keyframes sigilspin {
  to { transform: rotate(360deg); }
}

.sigil-inner {
  position: absolute;
  inset: 16px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,146,42,0.15), transparent);
  animation: sigilpulse 3s ease-in-out infinite;
}

@keyframes sigilpulse {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.08); }
}

.site-name {
  font-family: 'Cinzel', serif;
  font-size: clamp(3rem, 10vw, 5.5rem);
  font-weight: 900;
  letter-spacing: 0.15em;
  line-height: 1;
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 40%, var(--gold3) 60%, var(--gold) 100%);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: goldshift 4s linear infinite;
}

@keyframes goldshift {
  0% { background-position: 0% }
  100% { background-position: 200% }
}

.site-tagline {
  font-family: 'Crimson Pro', serif;
  font-size: clamp(0.85rem, 2vw, 1.05rem);
  font-style: italic;
  color: var(--dim);
  letter-spacing: 0.2em;
  margin-bottom: 40px;
}

.divider {
  width: 180px;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  margin: 0 auto 36px;
  position: relative;
}

.divider::before {
  content: '✦';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: var(--gold);
  font-size: 11px;
  background: var(--void);
  padding: 0 10px;
}

.redirect-msg {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.35em;
  color: var(--gold);
  opacity: 0.65;
  margin-bottom: 28px;
  text-transform: uppercase;
}

/* Progress bar */
.progress-wrap {
  width: 220px;
  height: 1px;
  background: rgba(201,146,42,0.15);
  border-radius: 2px;
  margin-bottom: 32px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(to right, var(--gold), var(--gold2));
  border-radius: 2px;
  animation: fill 4s linear forwards;
  box-shadow: 0 0 8px rgba(201,146,42,0.6);
}

@keyframes fill {
  from { width: 0%; }
  to   { width: 100%; }
}

.manual-link {
  font-family: 'Crimson Pro', serif;
  font-size: 13px;
  font-style: italic;
  color: var(--dim);
  letter-spacing: 0.05em;
}

.manual-link a {
  color: var(--gold2);
  text-decoration: none;
  transition: color 0.2s, opacity 0.2s;
  border-bottom: 1px solid rgba(201,146,42,0.25);
  padding-bottom: 1px;
}

.manual-link a:hover {
  color: var(--gold3);
  opacity: 0.85;
}
</style>
</head>
<body>

<canvas id="cosmos"></canvas>
<div class="nebula"></div>

<div class="content">
  <div class="sigil">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" stroke="rgba(201,146,42,0.4)" stroke-width="0.8"/>
      <circle cx="50" cy="50" r="38" stroke="rgba(201,146,42,0.2)" stroke-width="0.5"/>
      <polygon points="50,8 93,34 93,66 50,92 7,66 7,34" stroke="rgba(201,146,42,0.6)" stroke-width="0.8" fill="none"/>
      <polygon points="50,20 80,37 80,63 50,80 20,63 20,37" stroke="rgba(201,146,42,0.3)" stroke-width="0.5" fill="none"/>
      <circle cx="50" cy="50" r="6" fill="rgba(201,146,42,0.5)"/>
      <circle cx="50" cy="8" r="2.5" fill="rgba(201,146,42,0.7)"/>
      <circle cx="93" cy="34" r="2.5" fill="rgba(201,146,42,0.7)"/>
      <circle cx="93" cy="66" r="2.5" fill="rgba(201,146,42,0.7)"/>
      <circle cx="50" cy="92" r="2.5" fill="rgba(201,146,42,0.7)"/>
      <circle cx="7" cy="66" r="2.5" fill="rgba(201,146,42,0.7)"/>
      <circle cx="7" cy="34" r="2.5" fill="rgba(201,146,42,0.7)"/>
    </svg>
    <div class="sigil-inner"></div>
  </div>

  <h1 class="site-name">VEXORA</h1>
  <p class="site-tagline">knowledge shared across the void</p>
  <div class="divider"></div>

  <p class="redirect-msg">Entering the void</p>
  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>
  <p class="manual-link">not redirected? <a href="https://vexora.pythonanywhere.com">enter manually →</a></p>
</div>

<script>
const canvas = document.getElementById('cosmos');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}

function init() {
  stars = [];
  for(let i = 0; i < 400; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 0.8 + 0.1,
      a: Math.random() * 0.5 + 0.1,
      tw: Math.random() * Math.PI * 2,
      sp: Math.random() * 0.004 + 0.001,
      gold: Math.random() < 0.08
    });
  }
  for(let i = 0; i < 15; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.8,
      a: Math.random() * 0.6 + 0.3,
      tw: Math.random() * Math.PI * 2,
      sp: Math.random() * 0.002 + 0.0005,
      big: true,
      gold: Math.random() < 0.3
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.tw += s.sp;
    const a = s.a * (0.4 + 0.6 * Math.sin(s.tw));
    if(s.big) {
      const color = s.gold ? `rgba(201,146,42,${a})` : `rgba(180,140,255,${a})`;
      const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 10);
      g.addColorStop(0, color);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(s.x - 10, s.y - 10, 20, 20);
    }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = s.gold ? `rgba(201,146,42,${a})` : `rgba(200,170,255,${a})`;
    ctx.fill();
  });
  requestAnimationFrame(draw);
}

resize(); init(); draw();
window.addEventListener('resize', () => { resize(); init(); });
</script>
</body>
</html>
